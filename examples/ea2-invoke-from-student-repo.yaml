# Copiar a .github/workflows/<nombre>.yaml en el repo del alumno.
# Ajustar ORG/USER y el ref (@EA2 o @main cuando liberes).
#
# Secretos en el repo del alumno (Settings → Secrets):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   EA2_SSH_PRIVATE_KEY   → PEM (OpenSSH); la misma pareja la usa Terraform (pública derivada en CI) y SSH en el runner
#
# Opcional (p. ej. AWS Academy / Learner Lab con credenciales temporales):
#   AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
#
# Opcional — pulls privados Docker Hub (mismos secretos que EA1: DOCKER_USERNAME, DOCKER_PASSWORD).
#   `provision_dockerhub: false` en `with:` si en clase crean el secret a mano; `true` para que la receta lo deje listo.

on:
  workflow_dispatch:

jobs:
  ea2-lab:
    uses: ORG_O_USER/AUY1104-SharedWorkflows/.github/workflows/ea2-provision-k8s-sandbox.yaml@EA2
    with:
      aws_region: us-east-1
      instance_type: t3.small
      ssh_cidr_ipv4: 0.0.0.0/0
      k8s_api_cidr_ipv4: 0.0.0.0/0
      k8s_stack: k3s
      provision_dockerhub: true
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      EA2_SSH_PRIVATE_KEY: ${{ secrets.EA2_SSH_PRIVATE_KEY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
